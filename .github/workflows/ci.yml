name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Stream Deck app only runs on macOS and Windows; Linux is irrelevant
        # for an end-user-installable Stream Deck plugin. Drop ubuntu so we
        # don't pay for a runner that won't catch real user issues.
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      TESTAGENT_VERSION: v0.6.2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      # npm install (not ci): some transitive deps from rollup's native
      # bindings ship only the host platform's optional entries in the lock,
      # so `npm ci` rejects cross-OS runs. `npm install` still respects the
      # lock for resolved versions but won't fail on platform-only adds.
      - run: npm install --no-fund --no-audit

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install testagent (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   asset='testagent_linux_amd64.tar.gz' ;;
            Linux-ARM64) asset='testagent_linux_arm64.tar.gz' ;;
            macOS-X64)   asset='testagent_darwin_amd64.tar.gz' ;;
            macOS-ARM64) asset='testagent_darwin_arm64.tar.gz' ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          gh release download "$TESTAGENT_VERSION" -R paultyng/testagent -p "$asset" -O "$asset"
          tar -xzf "$asset" -C "$HOME/.local/bin" testagent
          chmod +x "$HOME/.local/bin/testagent"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install testagent (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $asset = switch ("${{ runner.arch }}") {
            "X64"   { "testagent_windows_amd64.zip" }
            "ARM64" { "testagent_windows_arm64.zip" }
            default { throw "unsupported windows arch: ${{ runner.arch }}" }
          }
          $dest = "$HOME\testagent"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          gh release download $env:TESTAGENT_VERSION -R paultyng/testagent -p $asset -O "$dest\$asset"
          Expand-Archive -Force -Path "$dest\$asset" -DestinationPath $dest
          Add-Content -Path $env:GITHUB_PATH -Value $dest

      - name: Verify testagent
        run: testagent --help

      # Run hooks:install against an isolated HOME and validate the
      # resulting settings.json against testagent's strict schema. Catches
      # typos in scripts/hooks.mjs (event name, hook type, missing url)
      # before they reach a user's real ~/.claude/settings.json.
      #
      # `.claude/` must exist before the install script's writeFile call —
      # Claude Code creates it on first run; we pre-create in CI.
      - name: Validate hooks install (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/.claude"
          HOME="$tmpdir" npm run --silent hooks:install
          testagent claude validate --strict --settings "$tmpdir/.claude/settings.json"

      - name: Validate hooks install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "agentsd-hooks-validate"
          New-Item -ItemType Directory -Force -Path (Join-Path $tmp ".claude") | Out-Null
          $env:USERPROFILE = $tmp
          $env:HOME = $tmp
          npm run --silent hooks:install
          testagent claude validate --strict --settings "$tmp\.claude\settings.json"

      - name: Test (with coverage on macOS)
        if: runner.os == 'macOS'
        run: npm run test:coverage

      - name: Test
        if: runner.os != 'macOS'
        run: npm test

      - name: Coverage summary
        if: runner.os == 'macOS' && always() && hashFiles('coverage/coverage-summary.json') != ''
        run: |
          {
            echo "## Coverage"
            echo
            echo "| File | Lines | Statements | Functions | Branches |"
            echo "|---|---|---|---|---|"
            jq -r '
              to_entries
              | sort_by(if .key == "total" then 0 else 1 end, .key)
              | .[]
              | "| \(if .key == "total" then "**Total**" else "`" + (.key | sub(".*/src/"; "src/")) + "`" end) | \(.value.lines.pct)% | \(.value.statements.pct)% | \(.value.functions.pct)% | \(.value.branches.pct)% |"
            ' coverage/coverage-summary.json
          } >> "$GITHUB_STEP_SUMMARY"
